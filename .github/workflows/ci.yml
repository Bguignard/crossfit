name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      APP_ENV: test
      APP_DEBUG: 0
      APP_SECRET: test-secret
      CHAT_GPT_API_KEY: test-key
      COMPOSER_ALLOW_SUPERUSER: 1
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
      PHP_CS_FIXER_IGNORE_ENV: 1
      SYMFONY_DEPRECATIONS_HELPER: 999999

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, intl, mbstring, pdo_pgsql
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validate Composer metadata
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Audit dependencies
        run: composer audit

      - name: Lint Symfony container
        run: php bin/console lint:container --env=test

      - name: Check coding style
        run: composer cs:check

      - name: Run Psalm
        run: composer psalm

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 16

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: test
      APP_DEBUG: 0
      APP_SECRET: test-secret
      CHAT_GPT_API_KEY: test-key
      COMPOSER_ALLOW_SUPERUSER: 1
      DATABASE_URL: postgresql://app:app@127.0.0.1:5432/app?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
      SYMFONY_DEPRECATIONS_HELPER: 999999

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, intl, mbstring, pdo_pgsql
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare test database
        run: |
          php bin/console doctrine:database:drop --env=test --force --if-exists
          php bin/console doctrine:database:create --env=test
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Validate Doctrine schema
        run: php bin/console doctrine:schema:validate --env=test

      - name: Run PHPUnit
        timeout-minutes: 12
        run: php -d memory_limit=1G bin/phpunit --colors=always
