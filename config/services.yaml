# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    env(CHAT_GPT_API_KEY): ''
    env(OPENAI_MODEL): 'gpt-5.4-mini'
    env(WORKOUT_AI_ANONYMOUS_DAILY_LIMIT): '5'
    env(WORKOUT_AI_FREE_USER_DAILY_LIMIT): '10'
    env(WORKOUT_AI_QUOTA_TIMEZONE): 'Europe/Paris'
    env(PYTHON_WORKER_TIMEOUT_SECONDS): '300'
    env(COMPETITION_GEOCODING_NOMINATIM_BASE_URL): 'https://nominatim.openstreetmap.org'
    env(COMPETITION_GEOCODING_USER_AGENT): 'MonWOD geocoder (https://www.monwod.fr)'
    env(COMPETITION_GEOCODING_TIMEOUT_SECONDS): '10'
    env(COMPETITION_GEOCODING_DELAY_MS): '1100'
    maxNumberOfRounds: 10

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
#    App\Services\Workout\WorkoutGeneratorServiceInterface:
#        class: App\Services\Workout\WorkoutGeneratorService
#        public: true
#        arguments:
#            $maxNumberOfRounds: '%maxNumberOfRounds%'

    App\Services\Workout\ChatGPTApiKeyInterface:
        class: App\Services\Workout\ChatGPTApiKey
        public: true
        arguments:
            $chatGPTApiKey: '%env(CHAT_GPT_API_KEY)%'
            $openAiModel: '%env(OPENAI_MODEL)%'

    App\Services\Competition\AthletePublicAnalysisGenerator:
        arguments:
            $chatGPTApiKey: '%env(CHAT_GPT_API_KEY)%'
            $openAiModel: '%env(OPENAI_MODEL)%'

    App\Services\Competition\CompetitionNominatimGeocoder:
        arguments:
            $baseUrl: '%env(COMPETITION_GEOCODING_NOMINATIM_BASE_URL)%'
            $userAgent: '%env(COMPETITION_GEOCODING_USER_AGENT)%'
            $timeoutSeconds: '%env(int:COMPETITION_GEOCODING_TIMEOUT_SECONDS)%'
            $delayMilliseconds: '%env(int:COMPETITION_GEOCODING_DELAY_MS)%'

    App\Services\Competition\CompetitionExternalGeocoderInterface:
        alias: App\Services\Competition\CompetitionNominatimGeocoder

    App\Services\Workout\MovementDifficultyServiceInterface:
        class: App\Services\Workout\MovementDifficultyService
        public: true

    App\Services\Workout\MovementServiceInterface:
        class: App\Services\Workout\MovementService
        public: true

    App\Services\Workout\MuscleServiceInterface:
        class: App\Services\Workout\MuscleService
        public: true

    App\Services\Workout\WorkoutCreatorServiceInterface:
        class: App\Services\Workout\WorkoutCreatorService
        public: true

    App\Services\Workout\WorkoutOriginServiceInterface:
        class: App\Services\Workout\WorkoutOriginService
        public: true

    App\Services\Workout\AiGeneration\WorkoutAiGenerationActorResolver:
        arguments:
            $appSecret: '%kernel.secret%'

    App\Services\Workout\AiGeneration\WorkoutAiGenerationUsageTracker:
        arguments:
            $anonymousDailyLimit: '%env(int:WORKOUT_AI_ANONYMOUS_DAILY_LIMIT)%'
            $freeUserDailyLimit: '%env(int:WORKOUT_AI_FREE_USER_DAILY_LIMIT)%'
            $quotaTimezone: '%env(WORKOUT_AI_QUOTA_TIMEZONE)%'

    App\Services\PythonWorker\PythonWorkerClient:
        arguments:
            $pythonWorkerBaseUrl: '%env(PYTHON_WORKER_BASE_URL)%'
            $pythonWorkerTimeoutSeconds: '%env(int:PYTHON_WORKER_TIMEOUT_SECONDS)%'

    App\Services\PythonWorker\PythonWorkerClientInterface:
        alias: App\Services\PythonWorker\PythonWorkerClient

    App\Services\Security\AuthEmailSender:
        arguments:
            $frontendBaseUrl: '%env(FRONTEND_BASE_URL)%'
            $fromEmail: '%env(MAILER_FROM)%'

    App\Services\Profile\ProgrammingNotificationEmailSender:
        arguments:
            $frontendBaseUrl: '%env(FRONTEND_BASE_URL)%'
            $fromEmail: '%env(MAILER_FROM)%'

    App\Services\Profile\ProgrammingNotificationSenderInterface:
        alias: App\Services\Profile\ProgrammingNotificationEmailSender

    App\DataProvider\WorkoutGenerationPossibleMovementsProvider:
        tags: ['api_platform.collection_data_provider']

    App\ApiPlatform\Extension\PublicWorkoutCatalogVisibilityExtension:
        tags:
            - { name: 'api_platform.doctrine.orm.query_extension.collection' }
            - { name: 'api_platform.doctrine.orm.query_extension.item' }
