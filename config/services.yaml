# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    maxNumberOfRounds: 10

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
#    App\Services\Workout\WorkoutGeneratorServiceInterface:
#        class: App\Services\Workout\WorkoutGeneratorService
#        public: true
#        arguments:
#            $maxNumberOfRounds: '%maxNumberOfRounds%'

    App\Services\Workout\ChatGPTApiKeyInterface:
        class: App\Services\Workout\ChatGPTApiKey
        public: true
        arguments:
            $chatGPTApiKey: '%env(CHAT_GPT_API_KEY)%'

    App\Services\Workout\MovementDifficultyServiceInterface:
        class: App\Services\Workout\MovementDifficultyService
        public: true

    App\Services\Workout\MovementServiceInterface:
        class: App\Services\Workout\MovementService
        public: true

    App\Services\Workout\MuscleServiceInterface:
        class: App\Services\Workout\MuscleService
        public: true

    App\Services\Workout\SimpleWorkoutCreatorServiceInterface:
        class: App\Services\Workout\SimpleWorkoutCreatorService
        public: true

    App\Services\Workout\WorkoutOriginServiceInterface:
        class: App\Services\Workout\WorkoutOriginService
        public: true


    App\DataProvider\WorkoutGenerationPossibleMovementsProvider:
        tags: ['api_platform.collection_data_provider']